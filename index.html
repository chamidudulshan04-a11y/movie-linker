<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
    <p>Please wait while we redirect you to the movie...</p>

   <script>
    // 1. Pinterest එකෙන් එන URL එකේ තියෙන movie parameter එක ගන්නවා
    const urlParams = new URLSearchParams(window.location.search);
    const movieSlug = urlParams.get('movie');
    
    // 2. ඔයාගේ සයිට් එකේ main domain එක
    const baseSite = "https://veloxstream.cfd/movie";

    if (movieSlug) {
        // 3. parameter එක තිබ්බොත් https://veloxstream.cfd/movie?movie=351-minions-monsters විදිහට redirect කරනවා
        window.location.href = baseSite + "?movie=" + movieSlug;
    } else {
        // 4. parameter එක නැත්නම් කෙලින්ම home page එකට යවනවා
        window.location.href = "https://veloxstream.cfd";
    }
</script>
</body>
</html>
