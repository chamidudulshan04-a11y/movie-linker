<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
    <p>Please wait while we redirect you to the movie...</p>

<script>
    // 1. URL එකේ තියෙන parameters ටික ගන්නවා
    const urlParams = new URLSearchParams(window.location.search);
    const movieSlug = urlParams.get('movie');
    const seriesSlug = urlParams.get('series');

    // 2. Movie එකක් ආවොත්
    if (movieSlug) {
        window.location.href = "https://veloxstream.cfd/movie?movie=" + movieSlug;
    } 
    // 3. TV Series එකක් ආවොත්
    else if (seriesSlug) {
        window.location.href = "https://veloxstream.cfd/series-view?series=" + seriesSlug;
    } 
    // 4. Parameter එකක් මුකුත්ම නැත්නම් Home page එකට
    else {
        window.location.href = "https://veloxstream.cfd";
    }
</script>
</body>
</html>
